plugins {
    alias(libs.plugins.android.application)
    // alias(libs.plugins.google.services) // Commented out until google-services.json is added
}

android {
    namespace 'com.example.routemind'
    compileSdk 36

    defaultConfig {
        applicationId "com.example.routemind"
        minSdk 25
        targetSdk 36
        versionCode 1
        versionName "1.0"

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }
}

dependencies {
    implementation libs.appcompat
    implementation libs.material
    implementation libs.activity
    implementation libs.constraintlayout
    implementation libs.generativeai
    implementation "com.google.guava:guava:33.0.0-android"
    
    // Firebase - Commented out until google-services.json is added
    // implementation platform(libs.firebase.bom)
    // implementation libs.firebase.auth
    // implementation libs.firebase.firestore
    // implementation libs.firebase.database

    // Image loading
    implementation libs.glide
    
    // Networking
    implementation libs.retrofit
    implementation libs.converter.gson
    implementation libs.gson

    testImplementation libs.junit
    androidTestImplementation libs.ext.junit
    androidTestImplementation libs.espresso.core
}
